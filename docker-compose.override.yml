# Development override for docker-compose.
#
# Use with `docker compose up` (Compose v2 picks up `*.override.yml`
# automatically). Mounts the source tree, runs uvicorn + streamlit
# in --reload mode, and exposes both services on the host. The base
# `docker-compose.yml` remains the production-shaped target.
services:
  api:
    build:
      target: base
    command: uvicorn raghub.api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./raghub:/app/raghub
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

  ui:
    build:
      target: base
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501 --server.runOnSave=true
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./raghub:/app/raghub
      - ./streamlit_app.py:/app/streamlit_app.py
    environment:
      PYTHONUNBUFFERED: "1"
