repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML]

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: ["-v", "--fail-under=80",
               "raghub/api/rag.py",
               "raghub/api/defaults.py",
               "raghub/api/response.py",
               "raghub/evaluation/",
               "raghub/knowledge/",
               "raghub/conversation/",
               "raghub/cli/"]
