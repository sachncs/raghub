[mypy]
python_version = 3.12
warn_unused_configs = True
disallow_untyped_defs = True
no_implicit_optional = True

[mypy-tests.*]
disallow_untyped_defs = False
ignore_missing_imports = True

[mypy-streamlit_app]
disallow_untyped_defs = False

[mypy-evaluate_financebench]
disallow_untyped_defs = False

