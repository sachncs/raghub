name: compose-e2e

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  JWT_SECRET: "test-secret-must-be-32-bytes-or-longer-for-sha256"
  RAG_PROFILE: "development"
  CORS_ORIGINS: "http://testserver"

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v7
      - name: Build api image
        run: docker build -t raghub:e2e .
      - name: Start api
        run: |
          docker run --rm -d --name raghub-e2e --network host \
            -e JWT_SECRET="$JWT_SECRET" \
            -e RAG_PROFILE="$RAG_PROFILE" \
            -e CORS_ORIGINS="$CORS_ORIGINS" \
            -e QDRANT_URL="http://localhost:6333" \
            raghub:e2e
      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/v1/health 2>/dev/null; then
              break
            fi
            sleep 2
          done
      - name: Smoke health
        run: curl -fsS http://127.0.0.1:8000/v1/health
      - name: Smoke metrics
        run: curl -fsS http://127.0.0.1:8000/metrics | head -3
      - name: Smoke login (negative)
        run: |
          curl -sS -o /dev/null -w "%{http_code}\n" \
            -X POST http://127.0.0.1:8000/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"nope@x.com","password":"x"}'
      - name: Stop api
        if: always()
        run: docker stop raghub-e2e 2>/dev/null || true