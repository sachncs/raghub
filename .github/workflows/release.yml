name: release

on:
  push:
    tags:
      - "v*"

env:
  JWT_SECRET: "test-secret-must-be-32-bytes-or-longer-for-sha256"
  RAG_PROFILE: "development"
  CORS_ORIGINS: "http://testserver"
  RAGHUB_RUN_PLATFORM_TESTS: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install declared dependencies
        run: pip install -e ".[api,ui,dev]"
      - name: Lint (ruff)
        run: ruff check raghub/ tests/ examples/ bench/
      - name: Format check (ruff)
        run: ruff format --check raghub/ tests/ examples/ bench/
      - name: Type-check (mypy)
        run: mypy raghub/
      - name: Unit tests
        run: |
          pytest -q --ignore=tests/test_financebench.py \
            --cov=raghub --cov-report=term-missing \
            --cov-fail-under=90
      - name: Build sdist and wheel
        run: python -m build

  publish:
    needs: quality
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
