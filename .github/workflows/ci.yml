name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: "test-secret-must-be-32-bytes-or-longer-for-sha256"
      RAG_PROFILE: "development"
      CORS_ORIGINS: "http://testserver"
      RAGHUB_RUN_PLATFORM_TESTS: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[api,ui,dev]"
      - name: Lint, types
        run: |
          ruff check raghub/ tests/ examples/ bench/
          ruff format --check raghub/ tests/ examples/ bench/
          mypy raghub/
      - name: Test
        run: pytest -q --ignore=tests/test_financebench.py --cov=raghub --cov-report=term-missing --cov-fail-under=90
