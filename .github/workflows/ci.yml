name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Cache mypy / ruff
        uses: actions/cache@v6
        with:
          path: |
            .mypy_cache
            .ruff_cache
          key: ${{ runner.os }}-lint-${{ hashFiles('pyproject.toml') }}
      - name: Install declared dependencies
        run: pip install -e ".[api,ui,dev]"
      - name: Lint (ruff)
        run: ruff check raghub/ tests/ examples/ bench/
      - name: Type-check (mypy)
        run: mypy raghub/
      - name: Docstring coverage (interrogate)
        run: |
          interrogate -v \
            raghub/api/rag.py raghub/api/defaults.py raghub/api/response.py \
            raghub/evaluation/ raghub/knowledge/ \
            raghub/conversation/ raghub/cli/ \
            -f 80
      - name: Unit tests with coverage gate
        run: |
          pytest -q --ignore=tests/test_financebench.py \
            --cov=raghub --cov-report=term-missing \
            --cov-fail-under=90
      - name: Integration tests (platform)
        env:
          RAGHUB_RUN_PLATFORM_TESTS: "1"
        run: |
          pytest -q tests/test_platform.py
      - name: Build docs (mkdocs)
        run: mkdocs build --strict
      - name: Security scan (bandit)
        run: bandit -r raghub/ -q -ll -i
      - name: Dependency audit (pip-audit, gating)
        run: |
          pip-audit --strict
      - name: Validate OpenAPI schema (gating)
        run: |
          python -c "
          from raghub.api.app import get_app
          app = get_app()
          spec = app.openapi()
          assert 'openapi' in spec, 'Missing openapi version'
          assert 'paths' in spec, 'Missing paths'
          assert spec.get('components', {}).get('schemas'), 'Missing schemas'
          print('OpenAPI schema validated:', spec['openapi'], 'paths:', len(spec['paths']))
          "
